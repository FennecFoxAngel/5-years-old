
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Nunito:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;}
#app{width:100%;min-height:640px;background:linear-gradient(135deg,#1a0533 0%,#2d0b5e 45%,#1a2a6c 100%);border-radius:16px;overflow:hidden;position:relative;}
.sparks{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.sp{position:absolute;width:5px;height:5px;border-radius:50%;animation:twk 3s infinite;opacity:0;}
@keyframes twk{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1)}}
.main{position:relative;z-index:2;display:flex;flex-direction:column;min-height:640px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(0,0,0,.35);border-bottom:1px solid rgba(255,215,0,.3);}
.logo{font-family:'Cinzel Decorative',serif;color:#ffd700;font-size:11px;}
.tmr{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.4);border-radius:20px;padding:3px 11px;color:#ffd700;font-size:12px;font-weight:700;}
.ctr{color:rgba(255,255,255,.6);font-size:11px;}
.pbar-o{width:100%;height:4px;background:rgba(255,255,255,.1);}
.pbar-i{height:100%;background:linear-gradient(90deg,#ffd700,#ff88dd);transition:width .5s;}
.phase-strip{display:flex;justify-content:center;gap:6px;padding:7px 12px;background:rgba(0,0,0,.25);}
.ph-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:20px;color:rgba(255,255,255,.6);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;padding:4px 14px;cursor:pointer;transition:all .2s;}
.ph-btn.on{background:rgba(255,215,0,.38);border-color:#ffd700;color:#fff;}
.slide-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px 14px;gap:8px;}
.word-lbl{font-family:'Cinzel Decorative',serif;font-size:52px;color:#fff;text-shadow:0 0 22px rgba(255,255,255,.55),0 4px 8px rgba(0,0,0,.5);letter-spacing:3px;animation:wpulse 2.2s ease-in-out infinite;}
@keyframes wpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.char-stage{width:100%;max-width:400px;height:190px;display:flex;align-items:center;justify-content:center;}
.sent-box{background:rgba(255,255,255,.12);border:1px solid rgba(255,215,0,.3);border-radius:14px;padding:14px 18px;max-width:460px;width:100%;text-align:center;}
.sent-txt{color:#fff;font-size:17px;font-weight:700;line-height:2.2;}
.sent-txt .hw{color:#ffd700;font-size:38px;font-weight:900;text-decoration:underline;display:inline-block;line-height:1.1;vertical-align:middle;}
.quiz-wrap{max-width:460px;width:100%;}
.quiz-q{color:#fff;font-size:17px;font-weight:700;text-align:center;margin-bottom:10px;line-height:1.45;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qopt{background:rgba(255,255,255,.11);border:2px solid rgba(255,255,255,.22);border-radius:14px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;line-height:1.4;}
.qopt .qword{font-size:28px;font-weight:900;display:block;margin-bottom:3px;}
.qopt .qemoji{font-size:22px;display:block;}
.qopt:hover:not(.done){background:rgba(255,255,255,.22);transform:scale(1.03);}
.qopt.ok{background:rgba(60,220,90,.28);border-color:#3cdc5a;color:#3cdc5a;}
.qopt.ok .qword{color:#3cdc5a;}
.qopt.no{background:rgba(255,70,70,.22);border-color:#ff4646;color:#ff8080;}
.qopt.no .qword{color:#ff8080;}
.quiz-res{text-align:center;font-size:16px;font-weight:800;color:#fff;min-height:24px;margin-top:8px;}
.navbar{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;background:rgba(0,0,0,.3);border-top:1px solid rgba(255,215,0,.2);flex-wrap:wrap;}
.nav-btn{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.5);border-radius:20px;color:#fff;font-size:11px;font-family:'Nunito',sans-serif;font-weight:700;padding:4px 9px;cursor:pointer;transition:all .2s;}
.nav-btn:hover,.nav-btn.on{background:rgba(255,215,0,.45);}
.narr{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.25);border-radius:20px;color:#fff;font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;padding:4px 13px;cursor:pointer;transition:all .2s;}
.narr:hover{background:rgba(255,255,255,.2);}
.toolbar{background:rgba(0,0,0,.5);border-top:2px solid rgba(255,215,0,.4);padding:8px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;}
.tlbl{font-size:10px;color:rgba(255,215,0,.7);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.trow{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.gbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.28);border-radius:18px;padding:4px 9px;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:48px;transition:all .2s;}
.gbtn .ge{font-size:15px;}
.gbtn .gl{font-size:10px;color:#fff;}
.gbtn:hover{transform:scale(1.1);background:rgba(255,255,255,.2);}
.ebtn{background:rgba(255,100,200,.14);border:1px solid rgba(255,100,200,.38);border-radius:18px;padding:4px 9px;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:56px;transition:all .2s;}
.ebtn .ge{font-size:15px;}
.ebtn .gl{font-size:10px;color:#fff;}
.ebtn:hover{background:rgba(255,100,200,.28);transform:scale(1.05);}
.rl{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
.fi{position:absolute;animation:fup 2.5s ease-out forwards;pointer-events:none;}

.sb{position:fixed;top:50%;left:50%;font-size:80px;animation:sba 1.5s ease-out forwards;pointer-events:none;z-index:1000;transform:translate(-50%,-50%);}

@keyframes runL{0%,100%{transform:rotate(-28deg)}50%{transform:rotate(28deg)}}
@keyframes runA{0%,100%{transform:rotate(22deg)}50%{transform:rotate(-22deg)}}
@keyframes runBod{0%,100%{transform:translateX(-4px) rotate(-4deg)}50%{transform:translateX(4px) rotate(4deg)}}

@keyframes clapR{0%,100%{transform:translateX(22px)}45%,55%{transform:translateX(0px)}}

@keyframes danceAR{0%,100%{transform:rotate(40deg)}50%{transform:rotate(-10deg)}}

@keyframes singMouth{0%,100%{transform:scaleY(1)}40%,60%{transform:scaleY(2.2)}}

  </div>
</div>

const GIFTS=[{e:'🌸',l:'Rose'},{e:'🌺',l:'Flower'},{e:'⭐',l:'Star'},{e:'🏆',l:'Trophy'},{e:'🎁',l:'Gift'},{e:'💎',l:'Gem'},{e:'🦋',l:'Butterfly'},{e:'🍭',l:'Candy'},{e:'🌈',l:'Rainbow'},{e:'✨',l:'Magic'}];
const EFFECTS=[{e:'🎉',l:'Confetti!',f:'doConfetti'},{e:'🌟',l:'Great Job!',f:'doStarBurst'},{e:'👀',l:'Look Here!',f:'doRing'},{e:'🥇',l:'Amazing!',f:'doAllStar'},{e:'💝',l:'Well Done!',f:'doHearts'}];

let slide=0,timerS=1800,qDone=false;

function init(){
  buildSparks();buildGifts();buildEffects();buildWordBtns();render();startTimer();
}

function buildSparks(){
  const l=document.getElementById('sparks');
  for(let i=0;i<18;i++){
    const s=document.createElement('div');s.className='sp';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.animationDelay=Math.random()*3+'s';s.style.animationDuration=(2+Math.random()*2)+'s';
    s.style.background=['gold','#ff88dd','#88ddff','#88ff88','white'][Math.floor(Math.random()*5)];
    l.appendChild(s);
  }
}

function buildGifts(){
  const r=document.getElementById('gRow');
  GIFTS.forEach(g=>{const b=document.createElement('button');b.className='gbtn';b.onclick=()=>reward(g.e);b.innerHTML=`<span class="ge">${g.e}</span><span class="gl">${g.l}</span>`;r.appendChild(b);});
}

function buildEffects(){
  const r=document.getElementById('eRow');
  EFFECTS.forEach(e=>{const b=document.createElement('button');b.className='ebtn';b.onclick=()=>window[e.f]();b.innerHTML=`<span class="ge">${e.e}</span><span class="gl">${e.l}</span>`;r.appendChild(b);});
}

function buildWordBtns(){
  const c=document.getElementById('wbtns');
  WORDS.forEach((w,i)=>{
    const b=document.createElement('button');b.className='nav-btn';b.id='wb'+i;
    b.style.fontSize='11px';b.style.padding='4px 9px';b.textContent=w;
    b.onclick=()=>{slide=i;qDone=false;render();};
    c.appendChild(b);
  });
}

function getPhase(s){return s<10?0:s<20?1:2;}
function goPhase(p){slide=p*10;qDone=false;render();}

function render(){
  const ph=getPhase(slide);
  [0,1,2].forEach(i=>document.getElementById('ph'+i).classList.toggle('on',i===ph));
  document.getElementById('ctr').textContent=`${slide+1} / 30`;
  document.getElementById('prog').style.width=`${((slide+1)/30)*100}%`;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('on',i===(slide%10)));

  const wi=slide%10;
  const word=WORDS[wi];
  const area=document.getElementById('slideArea');
  area.innerHTML='';

  const wl=document.createElement('div');wl.className='word-lbl';wl.textContent=word;area.appendChild(wl);

  if(ph===0){
    const st=document.createElement('div');st.className='char-stage';st.innerHTML=makeSVG(word);area.appendChild(st);

  } else if(ph===1){
    const st=document.createElement('div');st.className='char-stage';st.innerHTML=makeSVG(word);area.appendChild(st);
    const sb=document.createElement('div');sb.className='sent-box';
    const stxt=document.createElement('div');stxt.className='sent-txt';
    stxt.innerHTML=SENTENCES[wi].replace(`<b>${word}</b>`,`<span class="hw">${word}</span>`);
    sb.appendChild(stxt);area.appendChild(sb);

  } else {
    const Q=QUIZ[wi];
    qDone=false;
    const qw=document.createElement('div');qw.className='quiz-wrap';
    const qq=document.createElement('div');qq.className='quiz-q';qq.textContent=Q.q;qw.appendChild(qq);
    const og=document.createElement('div');og.className='quiz-opts';
    Q.opts.forEach((o,i)=>{
      const b=document.createElement('button');b.className='qopt';
      b.innerHTML=`<span class="qemoji">${o.e}</span><span class="qword">${o.w}</span>`;
      b.onclick=()=>{
        if(qDone)return;qDone=true;
        og.querySelectorAll('.qopt').forEach((btn,j)=>{
          btn.classList.add('done');
          if(j===Q.a)btn.classList.add('ok');
          else if(j===i&&i!==Q.a)btn.classList.add('no');
        });
        const res=document.getElementById('qres');
        if(i===Q.a){res.textContent='🌟 Yes! That is right!';doStarBurst();}
        else{res.textContent='💡 The answer is: '+Q.opts[Q.a].w;}
      };
      og.appendChild(b);
    });
    qw.appendChild(og);
    const res=document.createElement('div');res.className='quiz-res';res.id='qres';qw.appendChild(res);
    area.appendChild(qw);
  }
}

function prev(){if(slide>0){slide--;qDone=false;render();}}
function next(){if(slide<29){slide++;qDone=false;render();}}

function startTimer(){
  setInterval(()=>{
    timerS--;
    if(timerS<=0){document.getElementById('tmr').textContent='⏰ Done!';return;}
    const m=Math.floor(timerS/60),s=timerS%60;
    document.getElementById('tmr').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(timerS<=300){document.getElementById('tmr').style.background='rgba(255,80,80,.3)';document.getElementById('tmr').style.borderColor='rgba(255,80,80,.6)';}
  },1000);
}

function reward(e){
  const l=document.getElementById('rl');
  for(let i=0;i<6;i++){setTimeout(()=>{const el=document.createElement('div');el.className='fi';el.textContent=e;el.style.left=(20+Math.random()*60)+'%';el.style.bottom='80px';el.style.fontSize=(18+Math.random()*16)+'px';el.style.animationDuration=(1.5+Math.random())+'s';l.appendChild(el);setTimeout(()=>el.remove(),3000);},i*140);}
}
function doConfetti(){
  const l=document.getElementById('rl');const cs=['#ffd700','#ff88dd','#88ddff','#88ff88','#ff8888','#ffaa44'];
  for(let i=0;i<40;i++){setTimeout(()=>{const el=document.createElement('div');el.className='cp';el.style.left=(10+Math.random()*80)+'%';el.style.top='0';el.style.background=cs[Math.floor(Math.random()*cs.length)];el.style.animationDuration=(1.5+Math.random())+'s';el.style.animationDelay=Math.random()*.5+'s';l.appendChild(el);setTimeout(()=>el.remove(),3000);},Math.random()*300);}
}
function doStarBurst(){
  const el=document.createElement('div');el.className='sb';el.textContent='🌟';document.body.appendChild(el);
  const tx=document.createElement('div');tx.style.cssText='position:fixed;top:calc(50% + 65px);left:50%;transform:translateX(-50%);color:#ffd700;font-size:24px;font-weight:900;font-family:Cinzel Decorative,serif;z-index:1001;animation:sba 1.5s ease-out forwards;pointer-events:none;';tx.textContent='GREAT JOB!';document.body.appendChild(tx);
  setTimeout(()=>{el.remove();tx.remove();},2000);
}
function doRing(){for(let i=0;i<3;i++){setTimeout(()=>{const el=document.createElement('div');el.className='ar';el.style.borderColor=['gold','#ff88dd','#88ddff'][i];document.body.appendChild(el);setTimeout(()=>el.remove(),2000);},i*200);}}
function doAllStar(){doConfetti();setTimeout(doStarBurst,300);for(let i=0;i<8;i++)setTimeout(()=>reward(['🥇','⭐','🏆','✨'][i%4]),i*200);}
function doHearts(){const h=['💝','💖','💗','💕','❤️'];for(let i=0;i<10;i++)setTimeout(()=>reward(h[Math.floor(Math.random()*h.length)]),i*100);}

init();
</script>
