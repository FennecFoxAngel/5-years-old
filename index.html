
<style>

  .timer-display { background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.4); border-radius: 20px; padding: 4px 12px; color: #ffd700; font-size: 13px; font-weight: 700; }
  .slide-counter { color: rgba(255,255,255,0.6); font-size: 12px; }
  .slide-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
  .word-display { font-family: 'Cinzel Decorative', serif; font-size: 48px; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.6), 0 4px 8px rgba(0,0,0,0.5); letter-spacing: 4px; animation: wordPulse 2s ease-in-out infinite; }

  .nav-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,215,0,0.2); flex-wrap: wrap; }
  .nav-btn { background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.5); border-radius: 20px; color: white; font-size: 12px; font-family: 'Nunito', sans-serif; font-weight: 700; padding: 6px 14px; cursor: pointer; transition: all 0.2s; }
  .nav-btn:hover { background: rgba(255,215,0,0.3); transform: scale(1.05); }

  .nav-btn.arrow { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: white; font-size: 16px; padding: 6px 12px; }

    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    display: flex;

    align-items: center;
    justify-content: center;
    gap: 2px;

<div id="app">

  wizard: (col) => `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="180" height="180"><g style="animation:wave 0.8s ease-in-out infinite;transform-origin:100px 100px"><ellipse cx="100" cy="175" rx="25" ry="8" fill="rgba(0,0,0,0.2)"/><path d="M85 75 Q100 30 115 75 Z" fill="${col}"/><circle cx="100" cy="75" r="3" fill="#ffd700"/><ellipse cx="100" cy="88" rx="22" ry="18" fill="#FDBCB4"/><path d="M78 80 Q100 70 122 80 Q118 68 100 65 Q82 68 78 80 Z" fill="${col}"/><ellipse cx="92" cy="87" rx="3.5" ry="3.5" fill="#333"/><ellipse cx="108" cy="87" rx="3.5" ry="3.5" fill="#333"/><path d="M95 96 Q100 100 105 96" stroke="#a0604f" stroke-width="1.5" fill="none"/><rect x="80" y="106" width="40" height="48" rx="6" fill="${col}"/><line x1="80" y1="118" x2="60" y2="140" stroke="#FDBCB4" stroke-width="6" stroke-linecap="round"/><line x1="120" y1="118" x2="145" y2="100" stroke="#FDBCB4" stroke-width="6" stroke-linecap="round"/><line x1="145" y1="100" x2="160" y2="88" stroke="#888" stroke-width="3" stroke-linecap="round"/><circle cx="162" cy="86" r="5" fill="#ffd700"/><line x1="88" y1="154" x2="83" y2="175" stroke="${col}" stroke-width="8" stroke-linecap="round"/><line x1="112" y1="154" x2="117" y2="175" stroke="${col}" stroke-width="8" stroke-linecap="round"/></g><style>@keyframes wave{0%,100%{transform:rotate(0deg)}50%{transform:rotate(15deg)}}</style></svg>`,
  unicorn: (col) => `<svg viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg" width="200" height="180"><g style="animation:smileU 1.5s ease-in-out infinite;transform-origin:110px 120px"><ellipse cx="110" cy="168" rx="55" ry="10" fill="rgba(0,0,0,0.2)"/><ellipse cx="130" cy="125" rx="55" ry="35" fill="white"/><ellipse cx="70" cy="110" rx="30" ry="22" fill="white"/><ellipse cx="68" cy="95" rx="16" ry="12" fill="white"/><line x1="68" y1="83" x2="60" y2="55" stroke="#cc88ff" stroke-width="5" stroke-linecap="round"/><line x1="68" y1="83" x2="76" y2="58" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/><ellipse cx="58" cy="88" rx="7" ry="5" fill="white" stroke="#ffbbdd" stroke-width="1"/><ellipse cx="78" cy="88" rx="7" ry="5" fill="white" stroke="#ffbbdd" stroke-width="1"/><circle cx="62" cy="97" r="4" fill="#444"/><circle cx="74" cy="97" r="4" fill="#444"/><circle cx="63" cy="96" r="1.5" fill="white"/><circle cx="75" cy="96" r="1.5" fill="white"/><ellipse cx="58" cy="104" rx="4" ry="2" fill="#ffaacc"/><ellipse cx="78" cy="104" rx="4" ry="2" fill="#ffaacc"/><path d="M62 107 Q68 112 74 107" stroke="#c0604f" stroke-width="1.5" fill="none"/><path d="M150 60 Q180 55 185 80 Q180 75 165 80 Q175 75 155 85 Z" fill="${col}" opacity="0.8"/><path d="M140 65 Q165 50 170 70 Q160 68 155 75 Z" fill="#ff88dd" opacity="0.6"/><line x1="100" y1="145" x2="95" y2="168" stroke="white" stroke-width="8" stroke-linecap="round"/><line x1="120" y1="150" x2="118" y2="170" stroke="white" stroke-width="8" stroke-linecap="round"/><line x1="145" y1="150" x2="147" y2="170" stroke="white" stroke-width="8" stroke-linecap="round"/><line x1="165" y1="143" x2="170" y2="165" stroke="white" stroke-width="8" stroke-linecap="round"/><path d="M165 125 Q195 110 200 130 Q190 128 185 140 Q180 125 165 128 Z" fill="${col}"/></g><style>@keyframes smileU{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}</style></svg>`
};

let currentSlide = 0;
let timerSeconds = 1800;

function init() {
  buildSparkles();
  buildGiftButtons();
  buildWordButtons();
  buildWordDots();
  renderSlide(0);
  startTimer();
}

function buildSparkles() {
  const layer = document.getElementById('sparkleLayer');
  for (let i = 0; i < 25; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.animationDuration = (2 + Math.random() * 2) + 's';
    s.style.background = ['gold','#ff88dd','#88ddff','#88ff88','white'][Math.floor(Math.random()*5)];
    layer.appendChild(s);
  }
}

function buildGiftButtons() {
  const row = document.getElementById('giftRow');
  gifts.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'gift-btn';
    btn.onclick = () => sendReward(g.emoji);
    btn.innerHTML = `<span class="emoji">${g.emoji}</span><span class="label">${g.label}</span>`;
    row.appendChild(btn);
  });
}

function buildWordButtons() {
  const container = document.getElementById('wordBtns');
  words.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.style.fontSize = '11px';
    btn.style.padding = '4px 8px';
    btn.textContent = w.word;
    btn.onclick = () => renderSlide(i);
    container.appendChild(btn);
  });
}

function buildWordDots() {
  const container = document.getElementById('wordDots');
  words.forEach((w, i) => {
    const dot = document.createElement('div');
    dot.className = 'word-dot' + (i === 0 ? ' current' : '');
    dot.id = 'dot-' + i;
    dot.onclick = () => renderSlide(i);
    container.appendChild(dot);
  });
}

function renderSlide(index) {
  currentSlide = index;
  const data = words[index];
  const wordEl = document.getElementById('wordDisplay');
  wordEl.textContent = data.word;
  wordEl.style.color = 'white';
  wordEl.style.textShadow = '0 0 20px rgba(255,255,255,0.6), 0 4px 8px rgba(0,0,0,0.5)';
  document.getElementById('slideCounter').textContent = `${index + 1} / ${words.length}`;
  document.getElementById('progressBar').style.width = `${((index + 1) / words.length) * 100}%`;
  const stage = document.getElementById('characterStage');
  const charFn = characters[data.character];
  stage.innerHTML = charFn ? charFn(data.color) : '';
  document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${wordVideos[index]}?autoplay=0&controls=1&rel=0&modestbranding=1`;
  document.querySelectorAll('#wordBtns .nav-btn').forEach((btn, i) => btn.classList.toggle('active', i === index));
  document.querySelectorAll('.word-dot').forEach((dot, i) => {
    dot.classList.toggle('current', i === index);
    if (i < index) dot.classList.add('visited');
  });
}

function prevSlide() { if (currentSlide > 0) renderSlide(currentSlide - 1); }
function nextSlide() { if (currentSlide < words.length - 1) renderSlide(currentSlide + 1); }

function startTimer() {
  setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0) { document.getElementById('timerDisplay').textContent = '⏰ Done!'; return; }
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (timerSeconds <= 300) {
      document.getElementById('timerDisplay').style.background = 'rgba(255,80,80,0.3)';
      document.getElementById('timerDisplay').style.borderColor = 'rgba(255,80,80,0.6)';
    }
  }, 1000);
}

function sendReward(emoji) {
  const layer = document.getElementById('rewardLayer');
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'floating-item';
      el.textContent = emoji;
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.bottom = '100px';
      el.style.fontSize = (20 + Math.random() * 20) + 'px';
      el.style.animationDuration = (1.5 + Math.random()) + 's';
      layer.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 150);
  }
}

function triggerConfetti() {
  const layer = document.getElementById('rewardLayer');
  const colors = ['#ffd700','#ff88dd','#88ddff','#88ff88','#ff8888','#ffaa44'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = (10 + Math.random() * 80) + '%';
      el.style.top = '0px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random()) + 's';
      el.style.animationDelay = Math.random() * 0.5 + 's';
      layer.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, Math.random() * 300);
  }
}

function triggerStarBurst() {
  const el = document.createElement('div');
  el.className = 'star-burst';
  el.textContent = '🌟';
  document.body.appendChild(el);
  const txt = document.createElement('div');
  txt.style.cssText = 'position:fixed;top:calc(50% + 70px);left:50%;transform:translateX(-50%);color:#ffd700;font-size:28px;font-weight:700;font-family:Cinzel Decorative,serif;z-index:1001;animation:starBurst 1.5s ease-out forwards;text-shadow:0 0 20px gold;';
  txt.textContent = 'GREAT JOB!';
  document.body.appendChild(txt);
  setTimeout(() => { el.remove(); txt.remove(); }, 2000);
}

function triggerAttentionRing() {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'attention-ring';
      el.style.borderColor = ['gold','#ff88dd','#88ddff'][i];
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }, i * 200);
  }
}

function triggerAllStar() {
  triggerConfetti();
  setTimeout(triggerStarBurst, 300);
  for (let i = 0; i < 8; i++) {
    setTimeout(() => sendReward(['🥇','⭐','🏆','✨'][i % 4]), i * 200);
  }
}

function triggerHearts() {
  const hearts = ['💝','💖','💗','💕','❤️'];
  for (let i = 0; i < 10; i++) {
    setTimeout(() => sendReward(hearts[Math.floor(Math.random() * hearts.length)]), i * 100);
  }
}

init();
</script>
